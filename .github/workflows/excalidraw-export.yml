name: Export Excalidraw Diagrams to SVG

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docs/diagrams/**/*.json'
      - '.github/workflows/excalidraw-export.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docs/diagrams/**/*.json'

jobs:
  export-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install excalidraw-cli
        run: npm install -g @excalidraw/cli

      - name: Export Excalidraw diagrams to SVG
        run: |
          find docs/diagrams -name "*.json" -type f | while read jsonfile; do
            dir=$(dirname "$jsonfile")
            filename=$(basename "$jsonfile" .json)
            svgfile="$dir/${filename}.svg"

            excalidraw "$jsonfile" --output "$svgfile"
            echo "✅ Exported: $svgfile"
          done

      - name: Check if there are changes
        id: verify_changed_files
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push SVG exports
        if: steps.verify_changed_files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/diagrams/**/*.svg
          git commit -m "chore: export Excalidraw diagrams to SVG" --no-verify
          git push

      - name: No changes needed
        if: steps.verify_changed_files.outputs.changed == 'false'
        run: echo "✅ Excalidraw diagrams are up to date"
